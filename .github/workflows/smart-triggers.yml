name: smart triggers

on:
  push:
    branches:
        - main
        - 'release/*'
    paths:
      - 'src/**'
      - 'app/**'
    paths-ignore:
      - '*.md'
      - 'docs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run job
        run: echo "✅ Non-doc changes detected"