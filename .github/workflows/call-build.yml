name: call-build

on: 
    push:
        branches: 
            - master

jobs:
    call-build:
        uses: ./.github/workflows/reusable.yml
        with:
            app_name: "webu"
            environment: "production"
    print-version:
        runs-on: ubuntu-latest
        needs: [call-build]
        steps:
            - name: print version
              run: echo "Build version is ${{ needs.call-build.outputs.build_version }}"


        