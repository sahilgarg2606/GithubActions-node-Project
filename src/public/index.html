<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task Manager Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<div class="container py-5">
  
  <div class="card shadow-lg border-0">
    
    <div class="card-header bg-primary text-white d-flex justify-content-between">
      <h4 class="mb-0">🚀 Task Manager</h4>
      <span class="badge bg-dark" id="taskCount">0 Tasks</span>
    </div>

    <div class="card-body">

      <!-- Input -->
      <div class="input-group mb-4">
        <input type="text" id="taskInput" class="form-control" placeholder="Enter task...">
        <button class="btn btn-primary" onclick="addTask()">
          <i class="bi bi-plus-lg"></i>
        </button>
      </div>

      <!-- Task List -->
      <ul class="list-group" id="taskList"></ul>

      <!-- Empty -->
      <div id="emptyState" class="text-center text-muted mt-4 d-none">
        <i class="bi bi-inbox fs-1"></i>
        <p>No tasks yet</p>
      </div>

    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
